<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小问题</title>
    <style>
      :root {
        --bg1: #fff5fb;
        --bg2: #f3f7ff;
        --card: rgba(255, 255, 255, 0.78);
        --text: #1f2330;
        --muted: rgba(31, 35, 48, 0.62);
        --shadow: 0 18px 50px rgba(20, 30, 60, 0.16);
        --ring: 0 0 0 6px rgba(255, 111, 207, 0.18);
        --a1: #ff6fcf;
        --a2: #6f8cff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
        background: radial-gradient(900px 520px at 18% 22%, var(--bg1), transparent 70%),
          radial-gradient(900px 520px at 78% 62%, var(--bg2), transparent 70%),
          linear-gradient(135deg, #fff, #fbfdff);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .wrap {
        width: min(720px, 100%);
      }

      .card {
        background: var(--card);
        border: 1px solid rgba(0, 0, 0, 0.06);
        box-shadow: var(--shadow);
        border-radius: 20px;
        overflow: hidden;
        backdrop-filter: blur(10px);
      }

      header {
        padding: 18px 20px 0;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.06);
        background: rgba(255, 255, 255, 0.7);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--a1), var(--a2));
        box-shadow: 0 8px 20px rgba(255, 111, 207, 0.25);
      }

      .pill span {
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 0.2px;
      }

      main {
        padding: 18px 20px 20px;
      }

      h1 {
        margin: 14px 0 10px;
        font-size: clamp(22px, 4vw, 30px);
        line-height: 1.25;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .choices {
        margin-top: 18px;
        display: grid;
        gap: 12px;
      }

      button {
        appearance: none;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: rgba(255, 255, 255, 0.75);
        border-radius: 14px;
        padding: 14px 14px;
        text-align: left;
        cursor: pointer;
        font-size: 15px;
        line-height: 1.5;
        box-shadow: 0 10px 26px rgba(20, 30, 60, 0.08);
        transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 16px 34px rgba(20, 30, 60, 0.12);
      }

      button:focus-visible {
        outline: none;
        box-shadow: var(--shadow), var(--ring);
        border-color: rgba(255, 111, 207, 0.35);
      }

      .label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 9px;
        font-weight: 700;
        margin-right: 10px;
        color: #0c1020;
        background: linear-gradient(135deg, rgba(255, 111, 207, 0.34), rgba(111, 140, 255, 0.34));
        border: 1px solid rgba(0, 0, 0, 0.06);
      }

      .result {
        margin-top: 16px;
        border-radius: 14px;
        padding: 14px 14px;
        border: 1px dashed rgba(0, 0, 0, 0.14);
        background: rgba(255, 255, 255, 0.62);
        min-height: 54px;
        display: flex;
        align-items: center;
      }

      .result strong {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(255, 111, 207, 0.22), rgba(111, 140, 255, 0.22));
        border: 1px solid rgba(0, 0, 0, 0.06);
      }

      .footer {
        padding: 0 20px 18px;
        color: rgba(31, 35, 48, 0.5);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card" role="application" aria-label="选择题页面">
        <header>
          <div class="pill" aria-hidden="true">
            <div class="dot"></div>
            <span>点一下选项，会出现结果</span>
          </div>
        </header>

        <main>
          <h1>咱们会不会永远在一起呀？</h1>
          <p>请选择一个选项：</p>

          <div class="choices" role="group" aria-label="选项">
            <button type="button" id="optionA">
              <span class="label">A</span>
              祝成志会和朱静茹永远在一起哦
            </button>
            <button type="button" id="optionB">
              <span class="label">B</span>
              朱静茹会和祝成志永远在一起哒
            </button>
          </div>

          <div class="result" id="result" aria-live="polite">
            点击上面的 A 或 B～
          </div>
        </main>

        <div class="footer">做成链接后，发给对方打开就可以啦。</div>
      </div>
    </div>

    <script>
      const resultEl = document.getElementById("result");
      const optionA = document.getElementById("optionA");
      const optionB = document.getElementById("optionB");

      function setResult(text) {
        resultEl.innerHTML = `<strong>${text}</strong>`;
      }

      optionA.addEventListener("click", () => setResult("夸夸宝宝"));
      optionB.addEventListener("click", () => setResult("宝宝夸夸"));
    </script>
  </body>
</html>
